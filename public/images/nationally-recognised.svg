    <polygon points="-22,70 -10,70 -12,74 -20,74" fill="#C41E3A"/>
    <polygon points="-6,70 16,70 14,74 -8,74" fill="#006B3F"/>
    <polygon points="20,70 45,70 43,74 18,74" fill="#C41E3A"/>

    <!-- Row 9 -->
    <polygon points="-40,80 -24,80 -26,84 -38,84" fill="#C41E3A"/>
    <polygon points="-20,80 -12,80 -14,84 -18,84" fill="#006B3F"/>
    <polygon points="-8,80 12,80 10,84 -10,84" fill="#C41E3A"/>
    <polygon points="16,80 40,80 38,84 14,84" fill="#006B3F"/>

