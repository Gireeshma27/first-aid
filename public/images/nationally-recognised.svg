    <polygon points="0,40 28,40 26,44 -2,44" fill="#C41E3A"/>
    <polygon points="32,40 60,40 58,44 30,44" fill="#006B3F"/>

    <!-- Row 6 -->
    <polygon points="-55,50 -30,50 -32,54 -53,54" fill="#006B3F"/>
