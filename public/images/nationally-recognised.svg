  <!-- Text -->
  <text x="100" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333333" letter-spacing="1">
    <tspan x="100" dy="0">NATIONALLY RECOGNISED</tspan>
    <tspan x="100" dy="22">TRAINING</tspan>
